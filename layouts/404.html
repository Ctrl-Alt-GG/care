{{ define "main" }}
<section class="py-28 md:py-36">
  <div class="max-w-2xl mx-auto text-center">
    <p class="text-sm font-semibold uppercase tracking-widest text-zinc-500 dark:text-zinc-400">{{ i18n "error_label" }}</p>
    <h1 class="mt-4 text-6xl md:text-7xl font-bold text-zinc-900 dark:text-zinc-100">404</h1>
    <h2 class="mt-8 text-3xl md:text-4xl font-bold text-zinc-900 dark:text-zinc-100">{{ i18n "not_found_title" }}</h2>
    <p class="mt-6 text-zinc-600 dark:text-zinc-400">
      {{ i18n "not_found_desc" }}
    </p>
    <a href="{{ "/" | relLangURL }}" class="inline-block mt-10 px-6 py-3 rounded-xl bg-zinc-900 text-white font-semibold hover:bg-zinc-700 dark:bg-zinc-100 dark:text-zinc-900 dark:hover:bg-zinc-300 transition duration-300">
      {{ i18n "back_home" }}
    </a>
  </div>
</section>
{{ end }}
