{{ define "main" }}
<section class="py-20 md:py-28">
  <div class="max-w-2xl mx-auto text-center">
    <p class="text-sm font-semibold uppercase tracking-widest text-zinc-500">{{ i18n "error_label" }}</p>
    <h1 class="mt-3 text-6xl md:text-7xl font-bold">404</h1>
    <h2 class="mt-6 text-3xl md:text-4xl font-bold">{{ i18n "not_found_title" }}</h2>
    <p class="mt-4 text-zinc-600">
      {{ i18n "not_found_desc" }}
    </p>
    <a href="{{ "/" | relLangURL }}" class="inline-block mt-8 px-6 py-3 rounded-xl bg-zinc-900 text-white font-semibold hover:bg-zinc-700 transition duration-300">
      {{ i18n "back_home" }}
    </a>
  </div>
</section>
{{ end }}
