<!DOCTYPE html>
<html lang="{{ site.Language.Lang }}" dir="ltr">
<head>
  <script>
    (function () {
      try {
        var storedTheme = localStorage.getItem("theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;

        if (storedTheme === "dark" || (!storedTheme && prefersDark)) {
          document.documentElement.classList.add("dark");
        } else {
          document.documentElement.classList.remove("dark");
        }
      } catch (error) {
        document.documentElement.classList.remove("dark");
      }
    })();
  </script>
  {{ partial "head.html" . }}
</head>
<body class="dark:bg-zinc-900 dark:text-zinc-100">
  <header class="py-6 border-b dark:border-zinc-700">
    {{- partial "header.html" . -}}
  </header>
  <main class="max-w-7xl mx-auto px-4 md:px-6 lg:px-8">
    {{- block "main" . }}{{ end -}}
  </main>
  <footer class="bg-zinc-100 py-10 md:py-14 dark:bg-zinc-800">
    {{- partial "footer.html" . -}}
  </footer>
  {{- partialCached "footer/js.html" . }}
</body>
</html>
